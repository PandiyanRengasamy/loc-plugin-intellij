# ------------------------------------------------------------------------------------
# GenAI LOC Plugin - Configuration Properties
# File  : genai-loc.properties
#
# IMPORTANT - where to put this file when the plugin is INSTALLED:
#   Copy this file to your Windows user home:
#     C:\Users\<YourUsername>\genai-loc.properties
#   The plugin searches: %USERPROFILE%\genai-loc.properties first,
#   then the current working directory.
# ------------------------------------------------------------------------------------

# -- Backend API ---------------------------------------------------------------
backend.url=http://localhost:8080/api/v1/genai-loc/events

# -- Developer Info ------------------------------------------------------------
developer.id=752004
developer.name=Pandiyan Rengasamy

# -- Project / Sprint ----------------------------------------------------------
project.id=BaaC360
sprint.id=Sprint 1

# -- GenAI Tool ----------------------------------------------------------------
# Leave blank to auto-detect from installed plugins (Copilot, Claude, ChatGPT, Gemini, etc.)
# Override with: COPILOT | CLAUDE | CHATGPT | GEMINI | CODEWHISPERER | TABNINE | CODEIUM | OTHER
default.genai.tool=

# -- Plugin Behaviour ----------------------------------------------------------
# Set to false to disable all event tracking
plugin.enabled=true

# Number of events to collect before flushing to backend
# Set to 1 to send every event immediately (recommended for Copilot Chat)
batch.size=1

# How often (in seconds) buffered events are flushed to backend
flush.interval.seconds=10

# Minimum number of inserted lines to classify a change as GenAI-assisted
genai.line.threshold=3

